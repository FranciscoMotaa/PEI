<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650">
    <!-- Background -->
    <rect width="1000" height="650" fill="#0f172a" rx="15"/>
    
    <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
        </filter>
        <linearGradient id="gradDevice" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#2563eb"/>
        </linearGradient>
        <linearGradient id="gradBroker" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8b5cf6"/>
            <stop offset="100%" stop-color="#6d28d9"/>
        </linearGradient>
        <linearGradient id="gradCapture" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ef4444"/>
            <stop offset="100%" stop-color="#b91c1c"/>
        </linearGradient>
        <linearGradient id="gradAI" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#10b981"/>
            <stop offset="100%" stop-color="#059669"/>
        </linearGradient>
        <linearGradient id="gradDash" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f59e0b"/>
            <stop offset="100%" stop-color="#d97706"/>
        </linearGradient>
        <!-- Arrow Marker -->
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
        </marker>
        <marker id="arrow-enc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f43f5e"/>
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
        </marker>
    </defs>

    <!-- Title -->
    <text x="500" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#f8fafc" text-anchor="middle">Arquitetura de Classificação Passiva de Tráfego IoT</text>
    <text x="500" y="75" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Sem decifragem de payload (Zero-Knowledge) baseado em Metadados da Camada de Transporte</text>

    <!-- DATASETS -->
    <g transform="translate(60, 150)">
        <rect x="0" y="0" width="120" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
        <text x="60" y="30" font-family="Arial" font-size="12" font-weight="bold" fill="#f8fafc" text-anchor="middle">Datasets (CSV)</text>
        <text x="60" y="50" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">Valores Reais</text>
    </g>

    <!-- IOT DEVICES LAYER -->
    <g transform="translate(260, 120)">
        <!-- Box 1 -->
        <rect x="0" y="0" width="160" height="60" rx="8" fill="url(#gradDevice)" filter="url(#shadow)"/>
        <text x="80" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Device 1 (.10)</text>
        <text x="80" y="45" font-family="Arial" font-size="12" fill="#bfdbfe" text-anchor="middle">Telemetria</text>

        <!-- Box 2 -->
        <rect x="0" y="90" width="160" height="60" rx="8" fill="url(#gradDevice)" filter="url(#shadow)"/>
        <text x="80" y="115" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Device 2 (.11)</text>
        <text x="80" y="135" font-family="Arial" font-size="12" fill="#bfdbfe" text-anchor="middle">Event-Driven</text>

        <!-- Box 3 -->
        <rect x="0" y="180" width="160" height="60" rx="8" fill="url(#gradDevice)" filter="url(#shadow)"/>
        <text x="80" y="205" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Device 3 (.12)</text>
        <text x="80" y="225" font-family="Arial" font-size="12" fill="#bfdbfe" text-anchor="middle">Firmware OTA</text>
    </g>

    <!-- Connections Dataset to Devices -->
    <path d="M 180 185 L 220 185 L 220 150 L 250 150" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 180 185 L 220 185 L 220 240 L 250 240" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- BROKER -->
    <g transform="translate(700, 160)">
        <rect x="0" y="0" width="180" height="100" rx="10" fill="url(#gradBroker)" filter="url(#shadow)"/>
        <text x="90" y="35" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Broker MQTT</text>
        <text x="90" y="55" font-family="Arial" font-size="12" fill="#ddd6fe" text-anchor="middle">Mosquitto (Porta 8883)</text>
        <text x="90" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#a78bfa" text-anchor="middle">Totalmente Encriptado</text>
    </g>

    <!-- Connections Devices to Broker -->
    <path d="M 420 150 L 530 150 L 530 210 L 690 210" fill="none" stroke="#f43f5e" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow-enc)"/>
    <path d="M 420 210 L 690 210" fill="none" stroke="#f43f5e" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow-enc)"/>
    <path d="M 420 330 L 530 330 L 530 210" fill="none" stroke="#f43f5e" stroke-width="3" stroke-dasharray="6,4" />
    <text x="560" y="195" font-family="Arial" font-size="12" font-weight="bold" fill="#f43f5e">Payloads JSON Encriptados (TLSv1.3)</text>

    <!-- TSHARK CAPTURE (TAP) -->
    <g transform="translate(430, 360)">
        <rect x="0" y="0" width="200" height="80" rx="8" fill="url(#gradCapture)" filter="url(#shadow)"/>
        <text x="100" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Network Tap (Capture)</text>
        <text x="100" y="50" font-family="Arial" font-size="12" fill="#fecaca" text-anchor="middle">Ouve tráfego passivamente</text>
        <text x="100" y="65" font-family="Arial" font-size="12" font-weight="bold" fill="#fca5a5" text-anchor="middle">Extrai Metadados TCP/IP</text>
    </g>

    <!-- Tap Connection -->
    <path d="M 530 210 L 530 350" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow)"/>
    
    <!-- flow_fields.csv File -->
    <g transform="translate(390, 480)">
        <rect x="0" y="0" width="120" height="50" rx="4" fill="#334155" stroke="#475569" stroke-width="2"/>
        <text x="60" y="22" font-family="Courier New" font-size="12" fill="#cbd5e1" text-anchor="middle">flow_fields.csv</text>
        <text x="60" y="38" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">(Tamanho, Hora, IP)</text>
    </g>

    <!-- Connection Capture to flow_fields -->
    <path d="M 480 440 L 450 470" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- AI SERVER -->
    <g transform="translate(560, 480)">
        <rect x="0" y="0" width="200" height="100" rx="10" fill="url(#gradAI)" filter="url(#shadow)"/>
        <text x="100" y="30" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Servidor AI</text>
        <text x="100" y="50" font-family="Arial" font-size="12" fill="#a7f3d0" text-anchor="middle">Agrupa janelas (20 pacotes)</text>
        <text x="100" y="68" font-family="Arial" font-size="12" font-weight="bold" fill="#6ee7b7" text-anchor="middle">Random Forest Inference</text>
        <text x="100" y="85" font-family="Arial" font-size="11" fill="#ecfdf5" text-anchor="middle">Lê dataset contínuo com `tail`</text>
    </g>

    <!-- Connection flow_fields to AI Server -->
    <path d="M 510 505 L 550 505" fill="none" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)"/>
    <text x="530" y="495" font-family="Arial" font-size="10" font-weight="bold" fill="#10b981" text-anchor="middle">Streaming</text>

    <!-- DATABASE -->
    <g transform="translate(820, 490)">
        <!-- Cylinder shape for DB -->
        <ellipse cx="60" cy="15" rx="50" ry="15" fill="#1e293b" stroke="#334155" stroke-width="2"/>
        <path d="M 10 15 L 10 65 A 50 15 0 0 0 110 65 L 110 15 z" fill="#1e293b" stroke="#334155" stroke-width="2"/>
        <text x="60" y="45" font-family="Arial" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">SQLite</text>
        <text x="60" y="60" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">Classificações</text>
    </g>

    <!-- Connection AI to DB -->
    <path d="M 760 530 L 810 530" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)"/>

    <!-- DASHBOARD -->
    <g transform="translate(800, 310)">
        <rect x="0" y="0" width="140" height="70" rx="8" fill="url(#gradDash)" filter="url(#shadow)"/>
        <text x="70" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Dashboard Web</text>
        <text x="70" y="50" font-family="Arial" font-size="12" fill="#fde68a" text-anchor="middle">Porta 8080 (Flask)</text>
    </g>

    <!-- Connection DB to Dashboard -->
    <path d="M 870 475 L 870 390" fill="none" stroke="#f59e0b" stroke-dasharray="4,4" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="880" y="435" font-family="Arial" font-size="10" fill="#f59e0b">Lê Resultados</text>

    <!-- Legend -->
    <g transform="translate(50, 560)">
        <rect x="0" y="0" width="220" height="60" rx="5" fill="#1e293b" stroke="#334155"/>
        <text x="110" y="15" font-family="Arial" font-size="12" font-weight="bold" fill="#f8fafc" text-anchor="middle">Legenda</text>
        <path d="M 10 30 L 40 30" fill="none" stroke="#f43f5e" stroke-width="2" stroke-dasharray="4,2"/>
        <text x="50" y="34" font-family="Arial" font-size="11" fill="#f8fafc">Tráfego Encriptado (Oculto)</text>
        <path d="M 10 45 L 40 45" fill="none" stroke="#10b981" stroke-width="2"/>
        <text x="50" y="49" font-family="Arial" font-size="11" fill="#f8fafc">Fluxo de Dados Abertos (Metadados)</text>
    </g>

</svg>
