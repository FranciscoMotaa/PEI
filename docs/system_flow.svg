<svg viewBox="0 0 960 680" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="devGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="100%" style="stop-color:#196027"/>
    </linearGradient>
    <linearGradient id="brokerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#1158c7"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8957e5"/>
      <stop offset="100%" style="stop-color:#6639ba"/>
    </linearGradient>
    <linearGradient id="dashGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#da3633"/>
      <stop offset="100%" style="stop-color:#a91d1a"/>
    </linearGradient>
    <linearGradient id="trainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3b341"/>
      <stop offset="100%" style="stop-color:#b08a28"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e3b341"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8957e5"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="680" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">IoT Traffic Classification — System Flow</text>
  <line x1="120" y1="46" x2="840" y2="46" stroke="#30363d" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- TRAINING PHASE (top) -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="30" y="62" width="900" height="110" rx="8" fill="none" stroke="#e3b341" stroke-width="1" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="46" y="78" fill="#e3b341" font-size="11" font-weight="600">FASE DE TREINO (local, executado uma vez)</text>

  <!-- CSV files -->
  <rect x="50" y="86" width="150" height="72" rx="6" fill="url(#trainGrad)" opacity="0.85"/>
  <text x="125" y="106" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">📊 Datasets</text>
  <text x="125" y="122" text-anchor="middle" fill="#fffde7" font-size="9">train_test_network.csv</text>
  <text x="125" y="135" text-anchor="middle" fill="#fffde7" font-size="9">self_generated.csv</text>
  <text x="125" y="148" text-anchor="middle" fill="#fffde7" font-size="9">Binary-2DSCombined.csv</text>

  <!-- Train scripts -->
  <rect x="270" y="86" width="140" height="72" rx="6" fill="#21262d" stroke="#e3b341" stroke-width="1"/>
  <text x="340" y="106" text-anchor="middle" fill="#e3b341" font-size="11" font-weight="700">⚙️ Treino</text>
  <text x="340" y="122" text-anchor="middle" fill="#8b949e" font-size="9">python train.py</text>
  <text x="340" y="135" text-anchor="middle" fill="#8b949e" font-size="9">python train_binary.py</text>

  <!-- Models -->
  <rect x="480" y="86" width="150" height="72" rx="6" fill="#21262d" stroke="#8957e5" stroke-width="1"/>
  <text x="555" y="106" text-anchor="middle" fill="#8957e5" font-size="11" font-weight="700">🧠 Modelos</text>
  <text x="555" y="122" text-anchor="middle" fill="#8b949e" font-size="9">model.joblib</text>
  <text x="555" y="135" text-anchor="middle" fill="#8b949e" font-size="9">(telemetry/event/firmware)</text>
  <text x="555" y="148" text-anchor="middle" fill="#8b949e" font-size="9">binary_model.joblib</text>

  <!-- Training arrows -->
  <line x1="200" y1="122" x2="268" y2="122" stroke="#e3b341" stroke-width="1.5" marker-end="url(#arrowYellow)"/>
  <line x1="410" y1="122" x2="478" y2="122" stroke="#e3b341" stroke-width="1.5" marker-end="url(#arrowYellow)"/>

  <!-- Arrow from models down to AI server (runtime) -->
  <line x1="630" y1="122" x2="700" y2="122" stroke="#e3b341" stroke-width="1.5"/>
  <rect x="700" y="86" width="200" height="72" rx="6" fill="#21262d" stroke="#e3b341" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="800" y="106" text-anchor="middle" fill="#e3b341" font-size="11" font-weight="700">📂 ./data/</text>
  <text x="800" y="122" text-anchor="middle" fill="#8b949e" font-size="9">model.joblib  (130MB)</text>
  <text x="800" y="135" text-anchor="middle" fill="#8b949e" font-size="9">binary_model.joblib</text>
  <text x="800" y="148" text-anchor="middle" fill="#8b949e" font-size="9">iot_traffic.db</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- RUNTIME SECTION -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <text x="46" y="204" fill="#8b949e" font-size="11" font-weight="600">FASE DE EXECUÇÃO (docker compose up)</text>

  <!-- ── DEVICES ── -->
  <!-- Device 1 -->
  <rect x="30" y="216" width="155" height="62" rx="8" fill="url(#devGrad)"/>
  <text x="107" y="236" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">📡 device1</text>
  <text x="107" y="252" text-anchor="middle" fill="#d2f4d3" font-size="10">Telemetria Periódica</text>
  <text x="107" y="265" text-anchor="middle" fill="#bbf7c4" font-size="9">IAT ~5s | ~150B/msg</text>

  <!-- Device 2 -->
  <rect x="30" y="294" width="155" height="62" rx="8" fill="url(#devGrad)"/>
  <text x="107" y="314" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">📡 device2</text>
  <text x="107" y="330" text-anchor="middle" fill="#d2f4d3" font-size="10">Event-Driven</text>
  <text x="107" y="343" text-anchor="middle" fill="#bbf7c4" font-size="9">IAT variável | bursts</text>

  <!-- Device 3 -->
  <rect x="30" y="372" width="155" height="62" rx="8" fill="url(#devGrad)"/>
  <text x="107" y="392" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">📡 device3</text>
  <text x="107" y="408" text-anchor="middle" fill="#d2f4d3" font-size="10">Firmware Update</text>
  <text x="107" y="421" text-anchor="middle" fill="#bbf7c4" font-size="9">IAT ~30ms | ~512B/msg</text>

  <!-- TLS lock icons on arrows -->
  <!-- Device arrows to broker -->
  <line x1="185" y1="247" x2="328" y2="320" stroke="#58a6ff" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="185" y1="325" x2="328" y2="325" stroke="#58a6ff" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="185" y1="403" x2="328" y2="330" stroke="#58a6ff" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- TLS label -->
  <rect x="194" y="288" width="84" height="20" rx="4" fill="#0d1117" opacity="0.8"/>
  <text x="236" y="302" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="600">🔒 TLS :8883</text>

  <!-- ── BROKER ── -->
  <rect x="330" y="270" width="160" height="110" rx="8" fill="url(#brokerGrad)"/>
  <text x="410" y="294" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">🏠 Broker</text>
  <text x="410" y="310" text-anchor="middle" fill="#cae8ff" font-size="10">(Eclipse Mosquitto)</text>
  <line x1="350" y1="318" x2="470" y2="318" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="410" y="333" text-anchor="middle" fill="#cae8ff" font-size="10">• Termina TLS</text>
  <text x="410" y="347" text-anchor="middle" fill="#cae8ff" font-size="10">• Valida cert. CA</text>
  <text x="410" y="361" text-anchor="middle" fill="#cae8ff" font-size="10">• Re-envia (decifrado)</text>

  <!-- Broker to AI Server arrow -->
  <line x1="490" y1="325" x2="578" y2="325" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="534" y="314" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="600">MQTT</text>
  <text x="534" y="338" text-anchor="middle" fill="#3fb950" font-size="9">(decifrado)</text>

  <!-- ── AI SERVER ── -->
  <rect x="580" y="216" width="230" height="240" rx="8" fill="url(#aiGrad)" opacity="0.9"/>
  <text x="695" y="240" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">🤖 AI Server</text>
  <line x1="600" y1="248" x2="790" y2="248" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <text x="695" y="267" text-anchor="middle" fill="#e2d9f3" font-size="10" font-weight="600">1. Recebe msg MQTT</text>
  <text x="695" y="281" text-anchor="middle" fill="#d2b4f7" font-size="9">size = len(msg.payload)</text>
  <text x="695" y="293" text-anchor="middle" fill="#d2b4f7" font-size="9">ts = time.time()</text>

  <line x1="600" y1="301" x2="790" y2="301" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="695" y="316" text-anchor="middle" fill="#e2d9f3" font-size="10" font-weight="600">2. Acumula 20 mensagens</text>
  <text x="695" y="329" text-anchor="middle" fill="#d2b4f7" font-size="9">por device_id (flow_window)</text>

  <line x1="600" y1="337" x2="790" y2="337" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="695" y="352" text-anchor="middle" fill="#e2d9f3" font-size="10" font-weight="600">3. Extrai 5 features</text>
  <text x="695" y="365" text-anchor="middle" fill="#d2b4f7" font-size="9">num_packets · avg_size</text>
  <text x="695" y="377" text-anchor="middle" fill="#d2b4f7" font-size="9">std_size · avg_iat · total_bytes</text>

  <line x1="600" y1="386" x2="790" y2="386" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="695" y="401" text-anchor="middle" fill="#e2d9f3" font-size="10" font-weight="600">4a. model.joblib</text>
  <text x="695" y="414" text-anchor="middle" fill="#d2b4f7" font-size="9">→ telemetry / event / firmware</text>
  <text x="695" y="428" text-anchor="middle" fill="#e2d9f3" font-size="10" font-weight="600">4b. binary_model.joblib</text>
  <text x="695" y="441" text-anchor="middle" fill="#d2b4f7" font-size="9">→ Encrypted / Non-Encrypted</text>

  <!-- Arrow from models file to AI server -->
  <line x1="800" y1="158" x2="800" y2="216" stroke="#e3b341" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowYellow)"/>
  <text x="815" y="192" fill="#e3b341" font-size="9">carrega</text>

  <!-- AI Server to SQLite arrow -->
  <line x1="695" y1="456" x2="695" y2="518" stroke="#8957e5" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="715" y="494" fill="#8b949e" font-size="9">guarda</text>

  <!-- SQLite DB -->
  <rect x="600" y="520" width="185" height="58" rx="8" fill="#21262d" stroke="#8957e5" stroke-width="1.5"/>
  <text x="693" y="542" text-anchor="middle" fill="#d2b4f7" font-size="12" font-weight="700">🗄️ SQLite DB</text>
  <text x="693" y="557" text-anchor="middle" fill="#8b949e" font-size="9">iot_traffic.db</text>
  <text x="693" y="569" text-anchor="middle" fill="#8b949e" font-size="9">timestamp · device_id · class · confidence</text>

  <!-- SQLite to Dashboard arrow -->
  <line x1="785" y1="549" x2="844" y2="549" stroke="#da3633" stroke-width="2" marker-end="url(#arrowYellow)"/>

  <!-- Dashboard -->
  <rect x="845" y="216" width="100" height="390" rx="8" fill="url(#dashGrad)" opacity="0.85"/>
  <text x="895" y="244" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">🖥️</text>
  <text x="895" y="260" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Dashboard</text>
  <text x="895" y="276" text-anchor="middle" fill="#ffc1c0" font-size="9">:8080</text>
  <line x1="858" y1="284" x2="932" y2="284" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="895" y="300" text-anchor="middle" fill="#ffc1c0" font-size="9">• Login</text>
  <text x="895" y="315" text-anchor="middle" fill="#ffc1c0" font-size="9">• Classes</text>
  <text x="895" y="330" text-anchor="middle" fill="#ffc1c0" font-size="9">• Devices</text>
  <text x="895" y="345" text-anchor="middle" fill="#ffc1c0" font-size="9">• Tabela</text>
  <text x="895" y="360" text-anchor="middle" fill="#ffc1c0" font-size="9">• Refresh 5s</text>

  <!-- Arrow from AI server to dashboard (vertical) -->
  <line x1="845" y1="325" x2="810" y2="325" stroke="#da3633" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="810" y1="325" x2="810" y2="420" stroke="#da3633" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="810" y1="420" x2="845" y2="420" stroke="#da3633" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowYellow)"/>

  <!-- Legend -->
  <rect x="30" y="530" width="530" height="128" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="550" fill="#8b949e" font-size="11" font-weight="700">LEGENDA</text>
  <line x1="50" y1="555" x2="540" y2="555" stroke="#30363d" stroke-width="1"/>

  <!-- Legend items -->
  <line x1="60" y1="572" x2="100" y2="572" stroke="#58a6ff" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="108" y="576" fill="#8b949e" font-size="10">Tráfego MQTT encriptado (TLS) — payload ilegível para observadores externos</text>

  <line x1="60" y1="592" x2="100" y2="592" stroke="#3fb950" stroke-width="2"/>
  <text x="108" y="596" fill="#8b949e" font-size="10">Mensagem MQTT decifrada (interno ao broker) — payload acessível ao AI server</text>

  <line x1="60" y1="612" x2="100" y2="612" stroke="#e3b341" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="108" y="616" fill="#8b949e" font-size="10">Carregamento de modelos (uma vez no arranque)</text>

  <line x1="60" y1="632" x2="100" y2="632" stroke="#da3633" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="108" y="636" fill="#8b949e" font-size="10">Dados de classificação → visualização no dashboard</text>

  <rect x="60" y="645" width="14" height="10" rx="2" fill="#238636"/>
  <text x="82" y="654" fill="#8b949e" font-size="10">AI server usa apenas size + timestamp — nunca lê o payload JSON</text>

</svg>
